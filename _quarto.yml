project:
  type: manuscript
  output-dir: docs
  render:
    - final_report.qmd
  resources:
    - generate_figures.py

manuscript:
  article: final_report.qmd
  code-links:
    - text: generate_figures.py
      icon: file-code
      href: generate_figures.py

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    number-sections: true
    fig-cap-location: bottom
    fig-align: center
    embed-resources: true
    smooth-scroll: true
    code-fold: true
    code-summary: "Show code"

bibliography: references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/chicago-author-date.csl
